name: Discord Commit Notification
on: [push]
jobs:
  discord_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python -c "
          import json
          import requests
          import os
          
          webhook_url = os.environ['DISCORD_WEBHOOK']
          event = ${{ toJson(github.event) }}
          
          embed = {
            'title': f'New commit to {event['repository']['full_name']}',
            'description': event['head_commit']['message'],
            'color': 5814783,
            'author': {
              'name': event['head_commit']['author']['name'],
              'icon_url': f'https://github.com/{event['head_commit']['author']['username']}.png'
            },
            'fields': [
              {
                'name': 'Commit',
                'value': f'[{event['head_commit']['id'][:7]}]({event['head_commit']['url']})',
                'inline': True
              },
              {
                'name': 'Branch',
                'value': event['ref'].split('/')[-1],
                'inline': True
              }
            ],
            'footer': {
              'text': 'GitHub',
              'icon_url': 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'
            },
            'timestamp': event['head_commit']['timestamp']
          }
          
          payload = {'embeds': [embed]}
          response = requests.post(webhook_url, json=payload)
          response.raise_for_status()
          "
